<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solar Orientation + Shadow Simulation</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #canvas-wrapper { width: 100vw; height: 100vh; }
        #controls { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); color: white; padding: 20px; border: 1px solid #444; }
    </style>
    <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
    </script>
</head>
<body>
<div id="canvas-wrapper"></div>
<div id="controls">
    <label>SOLAR TIME (Projected Light)</label><br>
    <input type="range" id="hour" min="8" max="17" step="0.01" value="12">
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, sun;
    const container = document.getElementById('canvas-wrapper');

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000); // Absolute black floor
        camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 1, 5000);
        camera.position.set(0, 300, 600);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
        container.appendChild(renderer.domElement);
        
        // Near-zero ambient light creates the contrast for the beam
        scene.add(new THREE.AmbientLight(0xffffff, 0.01));
        
        sun = new THREE.DirectionalLight(0xffffff, 5); // Intense sun
        sun.castShadow = true;
        // Focus the shadow camera tightly on the floor area
        sun.shadow.camera.left = -300; sun.shadow.camera.right = 300;
        sun.shadow.camera.top = 300; sun.shadow.camera.bottom = -300;
        sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 1000;
        sun.shadow.mapSize.set(4096, 4096); // High resolution for sharp edges
        scene.add(sun);

        buildScene();
        animate();
    }

    function buildScene() {
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        
        // Wall
        const wallShape = new THREE.Shape();
        wallShape.moveTo(-100, -200); wallShape.lineTo(100, -200); wallShape.lineTo(100, 200); wallShape.lineTo(-100, 200);
        
        const hole = new THREE.Path();
        hole.moveTo(-12, 100); hole.lineTo(12, 100); hole.lineTo(12, 25); hole.lineTo(50, 25); 
        hole.lineTo(50, -25); hole.lineTo(12, -25); hole.lineTo(12, -150); hole.lineTo(-12, -150); 
        hole.lineTo(-12, -25); hole.lineTo(-50, -25); hole.lineTo(-50, 25); hole.lineTo(-12, 25);
        hole.lineTo(-12, 100);
        wallShape.holes.push(hole);

        const wall = new THREE.Mesh(new THREE.ExtrudeGeometry(wallShape, { depth: 20, bevelEnabled: false }), wallMat);
        wall.position.set(0, 200, -200);
        wall.castShadow = true;
        scene.add(wall);
        
        // Dark floor to show the light projection
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(800, 800), new THREE.MeshStandardMaterial({color: 0x0a0a0a}));
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);
    }

    function animate() {
        requestAnimationFrame(animate);
        const hr = document.getElementById('hour').value;
        const angle = (hr - 12) * (Math.PI / 6);
        // Position the sun to cast the beam
        sun.position.set(Math.sin(angle) * 500, 300, Math.cos(angle) * 500);
        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
