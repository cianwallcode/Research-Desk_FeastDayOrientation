<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solar Orientation + Shadow Simulation</title>
    <style>
        :root { --accent: #ff4500; --bg: #ffffff; }
        body { margin: 0; font-family: 'Georgia', serif; color: #333; background: #000; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; color: white; }
        .logo { cursor: pointer; font-weight: bold; font-size: 1.2rem; color: var(--accent); text-transform: uppercase; }
        #canvas-wrapper { flex: 1; position: relative; }
        #controls { position: absolute; bottom: 20px; left: 20px; z-index: 5; background: rgba(0,0,0,0.8); color: white; padding: 15px; border: 1px solid #444; }
        footer { padding: 10px; border-top: 1px solid #333; font-size: 10px; color: #555; text-align: center; background: #000; }
    </style>
    <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
    </script>
</head>
<body>
<header><div class="logo" onclick="location.reload()">SOLAR ORIENTATION + SHADOW SIMULATION</div></header>
<div id="canvas-wrapper"></div>
<div id="controls">
    <label>SOLAR TIME</label><br>
    <input type="range" id="hour" min="8" max="17" step="0.01" value="10.5">
</div>
<footer>&copy; 2026 R4 / Solar Orientation Simulation</footer>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, sun;
    const container = document.getElementById('canvas-wrapper');

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 1, 5000);
        // Tighter camera position for the 200-width scale
        camera.position.set(0, 200, 600);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.05));
        
        sun = new THREE.DirectionalLight(0xffffff, 3);
        sun.castShadow = true;
        // Adjusted shadow frustum for smaller 200-width scale
        sun.shadow.camera.left = -500; sun.shadow.camera.right = 500;
        sun.shadow.camera.top = 800; sun.shadow.camera.bottom = -400;
        sun.shadow.mapSize.set(2048, 2048);
        scene.add(sun);

        buildScene();
        animate();
    }

    function buildScene() {
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        
        // Wall: 200w x 400h
        const wallShape = new THREE.Shape();
        wallShape.moveTo(-100, -200); wallShape.lineTo(100, -200); wallShape.lineTo(100, 200); wallShape.lineTo(-100, 200);
        
        // Scaled Cruciform Hole (Proportional to 200w wall)
        const hole = new THREE.Path();
        hole.moveTo(-12, 100); hole.lineTo(12, 100); // Top
        hole.lineTo(12, 25); hole.lineTo(50, 25); // Right Arm
        hole.lineTo(50, -25); hole.lineTo(12, -25);
        hole.lineTo(12, -150); hole.lineTo(-12, -150); // Long Base
        hole.lineTo(-12, -25); hole.lineTo(-50, -25); // Left Arm
        hole.lineTo(-50, 25); hole.lineTo(-12, 25);
        hole.lineTo(-12, 100); // Close
        wallShape.holes.push(hole);

        const extrudeSettings = { depth: 20, bevelEnabled: false };
        const wallGeom = new THREE.ExtrudeGeometry(wallShape, extrudeSettings);
        const wall = new THREE.Mesh(wallGeom, wallMat);
        wall.position.set(0, 200, -200);
        wall.castShadow = true;
        scene.add(wall);
        
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(800, 800), new THREE.MeshStandardMaterial({color: 0x111111}));
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);
    }

    function animate() {
        requestAnimationFrame(animate);
        const hr = document.getElementById('hour').value;
        const angle = (hr - 12) * (Math.PI / 6);
        sun.position.set(Math.sin(angle) * 500, 400, Math.cos(angle) * 500);
        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
