<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Precedent Engine v11.0</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000' rx='15'/><text x='12' y='72' font-family='Arial Black' font-size='65' font-weight='900' fill='%23fff'>R</text><circle cx='70' cy='40' r='25' fill='%23ff6b00'/></svg>">
    <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
    </script>
    <style>
        :root { --soane-red: #8b0000; --ui-accent: #ff4500; }
        body { margin: 0; background: #fff; display: flex; height: 100vh; font-family: 'Georgia', serif; color: #1a1a1a; }
        .sidebar { width: 300px; border-right: 1px solid #ddd; padding: 25px; background: #fdfdfd; z-index: 10; display: flex; flex-direction: column; }
        h1 { font-size: 14px; border-bottom: 2px solid var(--ui-accent); padding-bottom: 8px; margin-bottom: 20px; text-transform: uppercase; }
        .control-group { margin-bottom: 25px; }
        label { font-size: 10px; font-weight: bold; color: #777; display: block; margin-bottom: 8px; }
        input[type="range"] { width: 100%; accent-color: var(--ui-accent); cursor: pointer; }
        .btn-jump { background: #000; color: #fff; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: 0.3s; }
        .btn-jump:hover { background: var(--soane-red); }
        .data-out { font-size: 14px; font-weight: bold; color: var(--ui-accent); font-family: monospace; }
        #canvas-container { flex: 1; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>BANK OF ENGLAND 1788</h1>
    
    <div class="control-group">
        <label>Perspective Toggle</label>
        <button class="btn-jump" id="viewToggle">JUMP TO SOANE INTERIOR</button>
    </div>

    <div class="control-group">
        <label>Solar Time (Shadow Scroll)</label>
        <input type="range" id="hour" min="7" max="18" step="0.01" value="11">
        <div id="hourVal" class="data-out">11:00 AM</div>
    </div>

    <div class="control-group">
        <label>Building Opacity</label>
        <input type="range" id="opacity" min="0.1" max="1" step="0.1" value="1">
    </div>

    <div id="status-box" style="margin-top:auto; font-size: 10px; color: #999; border-top:1px solid #eee; padding-top:10px;">
        &copy; 2026 R4 / BANK STOCK OFFICE RECONSTRUCTION
    </div>
</div>

<div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, sun, interiorLight, currentView = 'exterior';
    let extGroup, intGroup;
    const container = document.getElementById('canvas-container');

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        camera = new THREE.PerspectiveCamera(55, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(18, 12, 18);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        
        // Base Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        sun = new THREE.DirectionalLight(0xffffff, 2.0);
        sun.castShadow = true;
        sun.shadow.mapSize.set(4096, 4096);
        scene.add(sun);

        buildArchitecture();
        setupEvents();
        animate();
    }

    function buildArchitecture() {
        // --- EXTERIOR MODEL ---
        extGroup = new THREE.Group();
        const extBox = new THREE.Mesh(new THREE.BoxGeometry(12, 10, 12), new THREE.MeshStandardMaterial({color: 0xcccccc, transparent: true, opacity: 0.5}));
        extBox.position.y = 3;
        extGroup.add(extBox);
        scene.add(extGroup);

        // --- INTERIOR SOANE HALL ---
        intGroup = new THREE.Group();
        const stoneMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, side: THREE.DoubleSide, transparent: true, opacity: 1 });
        
        // Floor
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), stoneMat);
        floor.rotation.x = -Math.PI/2;
        floor.position.y = -5;
        floor.receiveShadow = true;
        intGroup.add(floor);

        // Pendentive Arches (Square Frame)
        for(let i=0; i<4; i++) {
            const arch = new THREE.Mesh(new THREE.BoxGeometry(10, 8, 1), stoneMat);
            arch.rotation.y = (Math.PI/2) * i;
            arch.position.set(i%2===0?0:(i===1?5:-5), -1, i%2!==0?0:(i===0?5:-5));
            intGroup.add(arch);
        }

        // Drum with 12 Apertures
        const drum = new THREE.Mesh(new THREE.CylinderGeometry(4.5, 4.5, 3, 32, 1, true), stoneMat);
        drum.position.y = 5.5;
        intGroup.add(drum);

        // Red Glass Windows
        const glassMat = new THREE.MeshBasicMaterial({ color: 0xff4500, transparent: true, opacity: 0.4 });
        for(let i=0; i<12; i++) {
            const win = new THREE.Mesh(new THREE.PlaneGeometry(1, 2.5), glassMat);
            const ang = (i/12) * Math.PI * 2;
            win.position.set(Math.cos(ang)*4.4, 5.5, Math.sin(ang)*4.4);
            win.lookAt(0, 5.5, 0);
            intGroup.add(win);
        }

        // Shallow Dome
        const dome = new THREE.Mesh(new THREE.SphereGeometry(4.5, 32, 16, 0, Math.PI*2, 0, Math.PI/3), stoneMat);
        dome.position.y = 7;
        dome.castShadow = true;
        intGroup.add(dome);

        // INTERNAL ORANGE-RED LIGHT
        interiorLight = new THREE.PointLight(0xff4500, 15, 25);
        interiorLight.position.set(0, 7, 0);
        interiorLight.castShadow = true;
        intGroup.add(interiorLight);

        intGroup.visible = false;
        scene.add(intGroup);
    }

    function setupEvents() {
        document.getElementById('viewToggle').onclick = () => {
            currentView = currentView === 'exterior' ? 'interior' : 'exterior';
            extGroup.visible = (currentView === 'exterior');
            intGroup.visible = (currentView === 'interior');
            
            if(currentView === 'interior') {
                camera.position.set(0, -2, 12);
                controls.target.set(0, 4, 0);
                document.getElementById('viewToggle').innerText = "BACK TO EXTERIOR";
            } else {
                camera.position.set(18, 12, 18);
                controls.target.set(0, 0, 0);
                document.getElementById('viewToggle').innerText = "JUMP TO SOANE INTERIOR";
            }
            controls.update();
        };
    }

    function animate() {
        requestAnimationFrame(animate);
        const hr = document.getElementById('hour').value;
        const op = document.getElementById('opacity').value;
        
        // Time Display
        const dispMin = Math.floor((hr % 1) * 60).toString().padStart(2, '0');
        document.getElementById('hourVal').innerText = `${Math.floor(hr)}:${dispMin}`;

        // Solar & Shadow Movement
        const angle = (hr - 12) * (Math.PI / 6);
        const sx = Math.sin(angle) * 35;
        const sz = Math.cos(angle) * 35;
        sun.position.set(sx, 20, sz);
        interiorLight.position.set(Math.sin(angle)*2, 7, Math.cos(angle)*2); // Moves with scroller

        // Opacity control
        intGroup.traverse(n => { if(n.isMesh && n.material.type !== "MeshBasicMaterial") n.material.opacity = op; });
        extGroup.traverse(n => { if(n.isMesh) n.material.opacity = op; });

        controls.update();
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
