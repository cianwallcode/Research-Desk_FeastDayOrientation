<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank of England: Human Scale</title>
    <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
    </script>
    <style>
        :root { --soane-red: #8b0000; --ui-accent: #ff4500; }
        body { margin: 0; background: #fff; display: flex; height: 100vh; font-family: 'Georgia', serif; }
        .sidebar { width: 300px; border-right: 1px solid #ddd; padding: 25px; background: #fdfdfd; z-index: 10; display: flex; flex-direction: column; }
        .btn-jump { background: #000; color: #fff; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .control-group { margin-bottom: 25px; }
        input[type="range"] { width: 100%; accent-color: var(--ui-accent); }
        .data-out { font-size: 14px; font-weight: bold; color: var(--ui-accent); font-family: monospace; }
        #canvas-container { flex: 1; }
    </style>
</head>
<body>

<div class="sidebar">
    <button class="btn-jump" id="viewToggle">JUMP TO INTERIOR</button>
    <div class="control-group">
        <label style="font-size:10px; font-weight:bold; color:#777;">SOLAR SCROLLER</label>
        <input type="range" id="hour" min="7" max="18" step="0.01" value="11">
        <div id="hourVal" class="data-out">11:00</div>
    </div>
</div>

<div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, sun, interiorLight, currentView = 'exterior';
    let extGroup, intGroup;
    const container = document.getElementById('canvas-container');

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 2000);
        camera.position.set(30, 20, 30);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        sun = new THREE.DirectionalLight(0xffffff, 2.0);
        sun.castShadow = true;
        scene.add(sun);

        buildArchitecture();
        animate();

        document.getElementById('viewToggle').onclick = toggleView;
    }

    function buildArchitecture() {
        // EXTERIOR (Small Preview)
        extGroup = new THREE.Group();
        const extBox = new THREE.Mesh(new THREE.BoxGeometry(10, 8, 10), new THREE.MeshStandardMaterial({color: 0xcccccc}));
        extGroup.add(extBox);
        scene.add(extGroup);

        // INTERIOR (HUGE SCALE - 50m Floor)
        intGroup = new THREE.Group();
        const stoneMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, side: THREE.DoubleSide });
        
        // Massive Floor
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), stoneMat);
        floor.rotation.x = -Math.PI/2;
        floor.position.y = -8;
        floor.receiveShadow = true;
        intGroup.add(floor);

        // Huge Arches (Pendentives)
        for(let i=0; i<4; i++) {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(40, 30, 2), stoneMat);
            wall.rotation.y = (Math.PI/2) * i;
            wall.position.set(i%2===0?0:(i===1?20:-20), 7, i%2!==0?0:(i===0?20:-20));
            intGroup.add(wall);
        }

        // Drum with Windows
        const drum = new THREE.Mesh(new THREE.CylinderGeometry(15, 15, 10, 32, 1, true), stoneMat);
        drum.position.y = 25;
        intGroup.add(drum);

        // Red Glass Emissive Windows
        const glassMat = new THREE.MeshBasicMaterial({ color: 0xff4500, transparent: true, opacity: 0.6 });
        for(let i=0; i<12; i++) {
            const win = new THREE.Mesh(new THREE.PlaneGeometry(4, 8), glassMat);
            const ang = (i/12) * Math.PI * 2;
            win.position.set(Math.cos(ang)*14.8, 25, Math.sin(ang)*14.8);
            win.lookAt(0, 25, 0);
            intGroup.add(win);
        }

        // Top Dome
        const dome = new THREE.Mesh(new THREE.SphereGeometry(15, 32, 16, 0, Math.PI*2, 0, Math.PI/2), stoneMat);
        dome.position.y = 30;
        dome.castShadow = true;
        intGroup.add(dome);

        // SOANE RED LIGHT (Moves with Scroller)
        interiorLight = new THREE.PointLight(0xff4500, 50, 100);
        interiorLight.position.set(0, 30, 0);
        interiorLight.castShadow = true;
        intGroup.add(interiorLight);

        intGroup.visible = false;
        scene.add(intGroup);
    }

    function toggleView() {
        currentView = currentView === 'exterior' ? 'interior' : 'exterior';
        extGroup.visible = (currentView === 'exterior');
        intGroup.visible = (currentView === 'interior');
        
        if(currentView === 'interior') {
            camera.position.set(0, -2, 45); // Set inside the huge nave
            controls.target.set(0, 15, 0); // Looking up at the drum
        } else {
            camera.position.set(30, 20, 30);
            controls.target.set(0, 0, 0);
        }
        controls.update();
    }

    function animate() {
        requestAnimationFrame(animate);
        const hr = document.getElementById('hour').value;
        document.getElementById('hourVal').innerText = Math.floor(hr) + ":00";

        const angle = (hr - 12) * (Math.PI / 6);
        sun.position.set(Math.sin(angle) * 100, 80, Math.cos(angle) * 100);
        
        // Match Red Interior Light to Sun Angle
        interiorLight.position.x = Math.sin(angle) * 10;
        interiorLight.position.z = Math.cos(angle) * 10;

        controls.update();
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
