<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Precedent 3D: Solar Analysis Demo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.170.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/examples/js/loaders/OBJLoader.js"></script>

    <style>
        :root { --accent: #ff6b00; }
        body { margin: 0; background: #000; display: flex; height: 100vh; font-family: sans-serif; color: #fff; }
        .sidebar { width: 280px; border-right: 1px solid #333; padding: 20px; background: #111; z-index: 10; overflow-y: auto; }
        h1 { font-size: 12px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; letter-spacing: 2px; }
        .control-group { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        label { font-size: 9px; font-weight: 900; text-transform: uppercase; color: #888; display: block; margin-bottom: 8px; }
        input { width: 100%; background: #222; border: 1px solid #444; color: #fff; margin-bottom: 10px; }
        input[type="range"] { accent-color: var(--accent); }
        .data-out { font-size: 11px; font-weight: bold; color: var(--accent); }
        .status-box { background: #1a1a1a; padding: 15px; font-size: 11px; border-left: 3px solid var(--accent); margin-top: auto; }
        #canvas-container { flex: 1; cursor: move; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>PRECEDENT ENGINE 3D</h1>

    <div class="control-group">
        <label>Solar Position</label>
        <input type="range" id="hour" min="6" max="18" step="0.01" value="10">
        <div class="data-out" id="hourVal">10:00</div>
        <input type="range" id="day" min="1" max = "365" value="355">
        <div class="data-out" id="dayVal">Dec 21 (Solstice)</div>
    </div>

    <div class="control-group">
        <label>Building Scale</label>
        <input type="range" id="towerH" min="5" max="20" value="12">
        <div class="data-out">Lantern Height</div>
    </div>

    <div class="control-group">
        <label>Upload Custom Site</label>
        <input type="file" id="fileInput" accept=".obj,.jpg,.png">
        <p style="font-size: 8px; color: #555;">Upload .OBJ for 3D or .JPG for floor plan.</p>
    </div>

    <div class="status-box">
        <strong>LIGHT TRACKER:</strong><br>
        <span id="status">Demo Model Active</span>
    </div>
</div>

<div id="canvas-container"></div>

<script>
    let scene, camera, renderer, sun, demoModel, floor, sunBeam;
    const container = document.getElementById('canvas-container');

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(25, 20, 25);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.2));
        
        sun = new THREE.DirectionalLight(0xffffff, 4);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.left = sun.shadow.camera.bottom = -20;
        sun.shadow.camera.right = sun.shadow.camera.top = 20;
        scene.add(sun);

        // Visual Beam
        const beamGeo = new THREE.CylinderGeometry(0.2, 3, 100, 32);
        const beamMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.15 });
        sunBeam = new THREE.Mesh(beamGeo, beamMat);
        scene.add(sunBeam);

        createDemoModel();
        setupFileUpload();
        animate();
    }

    function createDemoModel() {
        if (demoModel) scene.remove(demoModel);
        demoModel = new THREE.Group();

        const wallMat = new THREE.MeshStandardMaterial({ color: 0x444444, side: THREE.DoubleSide });

        // 1. Floor Plan (Baseline)
        const floorGeo = new THREE.PlaneGeometry(30, 30);
        floor = new THREE.Mesh(floorGeo, new THREE.MeshStandardMaterial({ color: 0x111111 }));
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // 2. The Nave Walls (Low resolution boxes)
        const nave = new THREE.Mesh(new THREE.BoxGeometry(16, 6, 6), wallMat);
        nave.position.set(-2, 3, 0);
        nave.castShadow = nave.receiveShadow = true;
        demoModel.add(nave);

        // 3. The Lantern Tower (The Aperture)
        const towerGeo = new THREE.BoxGeometry(4, 12, 4);
        const tower = new THREE.Mesh(towerGeo, wallMat);
        tower.position.set(6, 6, 0);
        tower.castShadow = tower.receiveShadow = true;
        demoModel.add(tower);

        // 4. The "Roofbox" Hole
        const holeGeo = new THREE.BoxGeometry(1, 1, 5);
        const hole = new THREE.Mesh(holeGeo, new THREE.MeshBasicMaterial({ color: 0x000000 }));
        hole.position.set(6, 11, 0); // Window in the tower
        demoModel.add(hole);

        scene.add(demoModel);
    }

    function setupFileUpload() {
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();

            if (file.name.endsWith('.obj')) {
                reader.onload = (event) => {
                    const loader = new THREE.OBJLoader();
                    const object = loader.parse(event.target.result);
                    scene.remove(demoModel);
                    demoModel = object;
                    demoModel.traverse(n => { if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; }});
                    scene.add(demoModel);
                    document.getElementById('status').innerText = "3D Model Loaded.";
                };
                reader.readAsText(file);
            } else {
                reader.onload = (event) => {
                    const loader = new THREE.TextureLoader();
                    loader.load(event.target.result, (tex) => {
                        floor.material.map = tex;
                        floor.material.needsUpdate = true;
                        document.getElementById('status').innerText = "Plan Projected.";
                    });
                };
                reader.readAsDataURL(file);
            }
        });
    }

    function updateSun() {
        const hour = parseFloat(document.getElementById('hour').value);
        const day = parseInt(document.getElementById('day').value);
        const tH = parseInt(document.getElementById('towerH').value);
        
        // Dynamic Model Update
        if (demoModel.children[2]) demoModel.children[2].scale.y = tH / 12;

        const date = new Date(2026, 0);
        date.setDate(day);
        date.setHours(Math.floor(hour), (hour % 1) * 60);

        const sunPos = SunCalc.getPosition(date, 53.69, -6.44);
        const x = 50 * Math.cos(sunPos.altitude) * Math.sin(sunPos.azimuth);
        const y = 50 * Math.sin(sunPos.altitude);
        const z = 50 * Math.cos(sunPos.altitude) * Math.cos(sunPos.azimuth);

        sun.position.set(x, y, z);
        sunBeam.position.set(x/2, y/2, z/2);
        sunBeam.lookAt(0, 0, 0);
        sunBeam.rotateX(Math.PI/2);

        document.getElementById('hourVal').innerText = `${Math.floor(hour)}:00`;
        document.getElementById('dayVal').innerText = date.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
    }

    function animate() {
        requestAnimationFrame(animate);
        updateSun();
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
