<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Soane Archive: Cinematic Perspective</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23ff4500%22/><text x=%2250%22 y=%2270%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2260%22 fill=%22white%22 text-anchor=%22middle%22>R</text></svg>">
    
    <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
    </script>
    <style>
        :root { --accent: #ff4500; --bg: #ffffff; }
        body { margin: 0; font-family: 'Georgia', serif; color: #333; background: var(--bg); height: 100vh; display: flex; flex-direction: column; }
        
        header { padding: 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .logo { cursor: pointer; font-weight: bold; font-size: 1.2rem; color: var(--accent); }
        nav a { margin-left: 20px; text-decoration: none; color: #333; font-size: 0.8rem; text-transform: uppercase; }
        
        #main-container { flex: 1; overflow-y: auto; position: relative; }
        #canvas-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #landing-page { position: absolute; z-index: 10; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-project { padding: 15px 30px; background: var(--accent); color: white; border: none; cursor: pointer; font-size: 1rem; }
        
        #controls { position: absolute; bottom: 20px; left: 20px; z-index: 5; background: rgba(255,255,255,0.9); padding: 15px; border: 1px solid #ddd; }
        footer { padding: 10px; border-top: 1px solid #ddd; font-size: 10px; color: #777; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">SOANE ARCHIVE</div>
    <nav>
        <a href="#">Inventory</a>
        <a href="#">Comparison</a>
    </nav>
</header>

<div id="main-container">
    <div id="landing-page">
        <h1>ARCHITECTURAL ENGINE</h1>
        <button id="start-project">START PROJECT</button>
    </div>
    <div id="canvas-wrapper"></div>
</div>

<div id="controls" style="display: none;">
    <button onclick="switchModel('soane')">Soane Interior</button>
    <button onclick="switchModel('tadoando')">Tadoando Church</button>
    <br><br>
    <label>TIME OF DAY</label>
    <input type="range" id="hour" min="8" max="17" step="0.01" value="10.5">
</div>

<footer>
    &copy; 2026 R4 / Bank of England Perspective | Contact: admin@soanearchive.com
</footer>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, sun;
    let modelGroup = new THREE.Group();
    const container = document.getElementById('canvas-wrapper');

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(70, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 10);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.minPolarAngle = Math.PI / 2.1; 
        controls.maxPolarAngle = Math.PI / 2.1;
        
        sun = new THREE.DirectionalLight(0xffffff, 2.5);
        scene.add(sun);
        scene.add(modelGroup);

        document.getElementById('start-project').onclick = () => {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('controls').style.display = 'block';
            switchModel('soane');
            animate();
        };
    }

    function switchModel(type) {
        modelGroup.clear();
        const mat = new THREE.MeshStandardMaterial({color: 0xcccccc});
        if(type === 'soane') {
            modelGroup.add(new THREE.Mesh(new THREE.BoxGeometry(10, 10, 10), mat));
        } else {
            modelGroup.add(new THREE.Mesh(new THREE.BoxGeometry(20, 5, 5), mat));
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        const hr = document.getElementById('hour').value;
        const angle = (hr - 12) * (Math.PI / 6);
        sun.position.set(Math.sin(angle) * 50, 50, Math.cos(angle) * 50);
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
