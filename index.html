<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Precedent Engine 3D</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000' rx='15'/><text x='10' y='72' font-family='Arial Black' font-size='60' font-weight='900' fill='%23fff'>R</text><circle cx='75' cy='35' r='15' fill='%23ff6b00'/></svg>">
    
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
      }
    }
    </script>

    <style>
        :root { --accent: #ff6b00; }
        body { margin: 0; background: #000; display: flex; height: 100vh; font-family: sans-serif; color: #fff; overflow: hidden; }
        
        .sidebar { width: 280px; border-right: 1px solid #333; padding: 20px; background: #111; z-index: 10; display: flex; flex-direction: column; }
        h1 { font-size: 14px; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; color: var(--accent); }
        
        .control-group { margin-bottom: 25px; }
        label { font-size: 9px; font-weight: 900; text-transform: uppercase; color: #888; display: block; }
        
        input { width: 100%; margin: 10px 0; accent-color: var(--accent); cursor: pointer; }
        .data-out { font-size: 11px; font-weight: bold; color: var(--accent); }

        #canvas-container { flex: 1; position: relative; background: #050505; }
        #status-box { background: #1a1a1a; padding: 15px; font-size: 11px; border-left: 3px solid var(--accent); margin-top: auto; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>PRECEDENT 3D v4.6</h1>

    <div class="control-group">
        <label>Solar Time</label>
        <input type="range" id="hour" min="6" max="19" step="0.01" value="10">
        <div id="hourVal" class="data-out">10:00</div>
    </div>

    <div class="control-group">
        <label>Load Floor Plan</label>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div id="status-box">
        <strong>ENGINE STATUS:</strong><br>
        <span id="status">Initializing...</span>
    </div>
</div>

<div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, sun, floor, lantern;
    const container = document.getElementById('canvas-container');

    function init() {
        try {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(15, 12, 15);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
            sun = new THREE.DirectionalLight(0xffffff, 4);
            sun.castShadow = true;
            sun.shadow.mapSize.set(2048, 2048);
            scene.add(sun);

            // The Demo Building
            const material = new THREE.MeshStandardMaterial({ color: 0x444444 });
            
            // Nave
            const nave = new THREE.Mesh(new THREE.BoxGeometry(10, 4, 4), material);
            nave.castShadow = true;
            nave.receiveShadow = true;
            scene.add(nave);

            // Lantern Tower
            const tower = new THREE.Mesh(new THREE.BoxGeometry(3, 8, 3), material);
            tower.position.set(3.5, 2, 0);
            tower.castShadow = true;
            tower.receiveShadow = true;
            scene.add(tower);

            // Floor
            const floorGeo = new THREE.PlaneGeometry(20, 20);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -2;
            floor.receiveShadow = true;
            scene.add(floor);

            document.getElementById('status').innerText = "3D Engine Active";
            animate();
        } catch (err) {
            document.getElementById('status').innerText = "Error: " + err.message;
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        
        // Solar Math
        const hr = document.getElementById('hour').value;
        document.getElementById('hourVal').innerText = Math.floor(hr) + ":" + Math.floor((hr % 1) * 60).toString().padStart(2, '0');
        
        const angle = (hr - 12) * (Math.PI / 6); // Simplified path
        sun.position.set(Math.sin(angle) * 20, 15, Math.cos(angle) * 20);
        
        renderer.render(scene, camera);
    }

    // Image Upload Listener
    document.getElementById('fileInput').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const loader = new THREE.TextureLoader();
            loader.load(event.target.result, (tex) => {
                floor.material.map = tex;
                floor.material.needsUpdate = true;
                document.getElementById('status').innerText = "Floor Plan Uploaded";
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    init();
</script>

</body>
</html>
