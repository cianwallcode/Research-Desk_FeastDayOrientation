<div class="sidebar">

    <button class="btn-jump" id="viewToggle">JUMP TO SOANE INTERIOR</button>
    
    <div class="label">Solar Time</div>
    <input type="range" id="hour" min="8" max="18" step="0.01" value="12">
    <div id="hourVal" style="color:var(--accent); font-weight:bold; margin-bottom:20px;">12:00</div>

    <div id="status-box" style="margin-top:auto; font-size:10px; color:#999; border-top:1px solid #ddd; padding-top:10px;">
        Mode: <span id="modeName">Exterior Model</span><br>
        Source: Bank of England (Consols Office Reconstruction)

</div>

<div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, sun, interiorLight, currentView = 'exterior';
    let exteriorGroup, interiorGroup;
    const container = document.getElementById('canvas-container');

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(15, 10, 15);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        sun = new THREE.DirectionalLight(0xffffff, 2.5);
        sun.castShadow = true;
        scene.add(sun);

        buildModels();
        setupEvents();
        animate();
    }

        exteriorGroup = new THREE.Group();
        const extMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, transparent: true, opacity: 0.6 });
        const box = new THREE.Mesh(new THREE.BoxGeometry(10, 8, 10), extMat);
        exteriorGroup.add(box);
        scene.add(exteriorGroup);

        interiorGroup = new THREE.Group();

            transparent: true, 
            opacity: 0.8
