<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Soane Archive: Cinematic Perspective</title>
    <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
    </script>
    <style>
        body { margin: 0; background: #fff; display: flex; height: 100vh; font-family: 'Georgia', serif; overflow: hidden; }
        .sidebar { width: 300px; border-right: 1px solid #ddd; padding: 25px; background: #fdfdfd; z-index: 10; display: flex; flex-direction: column; }
        h1 { font-size: 14px; border-bottom: 2px solid #ff4500; padding-bottom: 8px; margin-bottom: 20px; text-transform: uppercase; }
        .control-group { margin-bottom: 25px; }
        label { font-size: 10px; font-weight: bold; color: #777; display: block; margin-bottom: 8px; }
        input[type="range"] { width: 100%; accent-color: #ff4500; cursor: pointer; }
        .data-out { font-size: 14px; font-weight: bold; color: #ff4500; font-family: monospace; }
        #canvas-container { flex: 1; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>SOANE ARCHIVE v15</h1>
    <div class="control-group">
        <label>SOLAR TIME (SHADOW SLIDER)</label>
        <input type="range" id="hour" min="8" max="17" step="0.01" value="10.5">
        <div id="hourVal" class="data-out">10:30 AM</div>
    </div>
    <div style="margin-top:auto; font-size: 10px; color: #999;">
        &copy; 2026 R4 / Bank of England Perspective<br>
        Lens: 24mm Wide-Angle
    </div>
</div>

<div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, sun, interiorLight;
    const container = document.getElementById('canvas-container');

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        // Wide angle lens to match your image
        camera = new THREE.PerspectiveCamera(70, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(-15, -4, 25); // Set at eye-level in the nave aisle

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 15, 0); // Focus on the drum/arches
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        sun = new THREE.DirectionalLight(0xffffff, 2.5);
        sun.castShadow = true;
        sun.shadow.mapSize.set(4096, 4096);
        scene.add(sun);

        buildSoaneHall();
        animate();
    }

    function buildSoaneHall() {
        const mat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, side: THREE.DoubleSide });

        // Massive floor
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), mat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -10;
        floor.receiveShadow = true;
        scene.add(floor);

        // Pendentive Piers (The heavy structural corners)
        const pierGeom = new THREE.BoxGeometry(10, 30, 10);
        for(let x of [-15, 15]) {
            for(let z of [-15, 15]) {
                const pier = new THREE.Mesh(pierGeom, mat);
                pier.position.set(x, 5, z);
                pier.castShadow = pier.receiveShadow = true;
                scene.add(pier);
            }
        }

        // Drum Windows (12 Voids)
        const drumRadius = 10;
        const glassMat = new THREE.MeshStandardMaterial({ color: 0xff4500, emissive: 0xff4500, emissiveIntensity: 2, transparent: true, opacity: 0.5 });
        for(let i=0; i<12; i++) {
            const win = new THREE.Mesh(new THREE.PlaneGeometry(3, 6), glassMat);
            const ang = (i / 12) * Math.PI * 2;
            win.position.set(Math.cos(ang) * 9.8, 25, Math.sin(ang) * 9.8);
            win.lookAt(0, 25, 0);
            scene.add(win);
        }

        // Dome Cap
        const dome = new THREE.Mesh(new THREE.SphereGeometry(drumRadius, 32, 16, 0, Math.PI*2, 0, Math.PI/2.5), mat);
        dome.position.y = 28;
        dome.castShadow = true;
        scene.add(dome);

        // THE RED ORANGE LIGHT SOURCE (Inside the drum)
        interiorLight = new THREE.PointLight(0xff4500, 40, 80);
        interiorLight.position.set(0, 25, 0);
        interiorLight.castShadow = true;
        scene.add(interiorLight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const hr = document.getElementById('hour').value;
        const dispMin = Math.floor((hr % 1) * 60).toString().padStart(2, '0');
        document.getElementById('hourVal').innerText = `${Math.floor(hr)}:${dispMin} ${hr>=12?'PM':'AM'}`;

        const angle = (hr - 12) * (Math.PI / 6);
        sun.position.set(Math.sin(angle) * 80, 60, Math.cos(angle) * 80);
        
        // Sync interior light to follow solar angle
        interiorLight.position.x = Math.sin(angle) * 8;
        interiorLight.position.z = Math.cos(angle) * 8;

        controls.update();
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
