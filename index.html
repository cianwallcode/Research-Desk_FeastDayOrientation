<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Precedent Engine 3D</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000' rx='15'/><text x='12' y='72' font-family='Arial Black' font-size='65' font-weight='900' fill='%23fff'>R</text><circle cx='70' cy='40' r='25' fill='%23ff6b00'/></svg>">
    
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
    </script>

    <style>
        :root { --accent: #ff6b00; --ui-bg: #f5f5f5; --text: #1a1a1a; }
        body { margin: 0; background: #fff; display: flex; height: 100vh; font-family: 'Inter', sans-serif; color: var(--text); overflow: hidden; }
        
        .sidebar { width: 300px; border-right: 1px solid #ddd; padding: 20px; background: var(--ui-bg); z-index: 10; display: flex; flex-direction: column; }
        h1 { font-size: 14px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; letter-spacing: 1px; color: #000; }
        
        .control-group { margin-bottom: 20px; border-bottom: 1px solid #e0e0e0; padding-bottom: 15px; }
        label { font-size: 9px; font-weight: 900; text-transform: uppercase; color: #666; display: block; margin-bottom: 5px; }
        
        input, select { width: 100%; background: #fff; border: 1px solid #ccc; color: #000; padding: 8px; margin: 5px 0; border-radius: 4px; }
        input[type="range"] { accent-color: var(--accent); cursor: pointer; border: none; }
        
        .data-out { font-size: 11px; font-weight: bold; color: var(--accent); }
        .btn-ui { background: var(--accent); border: none; color: #fff; padding: 10px; width: 100%; cursor: pointer; font-size: 10px; font-weight: bold; border-radius: 4px; }

        #canvas-container { flex: 1; position: relative; background: #fff; }
        #status-box { background: #eee; padding: 15px; font-size: 10px; border-left: 3px solid var(--accent); margin-top: auto; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>PRECEDENT ENGINE 3D</h1>

    <div class="control-group">
        <label>Solar Time</label>
        <input type="range" id="hour" min="6" max="18" step="0.01" value="10.5">
        <div id="hourVal" class="data-out">10:30</div>
    </div>

    <div class="control-group">
        <label>View Management</label>
        <select id="spaceJump">
            <option value="exterior">Exterior Overview</option>
            <option value="interior_nave">Interior: Nave Center</option>
            <option value="under_dome">Interior: Under Dome (Look Up)</option>
        </select>
    </div>

    <div class="control-group">
        <label>Building Transparency</label>
        <input type="range" id="opacity" min="0.1" max="1" step="0.1" value="0.4">
    </div>

    <div class="control-group">
        <label>Asset Integration</label>
        <input type="file" id="objInput" accept=".obj">
        <input type="file" id="imgInput" accept="image/*">
        <div style="font-size: 8px; color: #999; margin-top: 5px;">Upload .OBJ for building or .JPG for floor plan.</div>
    </div>

    <div id="status-box">
        <strong>PRECEDENT DATA:</strong><br>
        <span id="status">Scene Initialized on White.</span>
        <div style="margin-top:5px; font-size: 8px; color:#777;">&copy; 2026 R4 All Rights Reserved</div>
    </div>
</div>

<div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, sun, floor, building;
    const container = document.getElementById('canvas-container');

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); // WHITE BACKGROUND

        camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(15, 10, 15);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Soft shadows for readability
        container.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        
        // Balanced Light: High Ambient for visibility, strong Sun for shadows
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        sun = new THREE.DirectionalLight(0xffffff, 2.5);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        scene.add(sun);

        // Floor (The Plan Carrier)
        const floorGeo = new THREE.PlaneGeometry(30, 30);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xf0f0f0 });
        floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -2;
        floor.receiveShadow = true;
        scene.add(floor);

        createSoaneDemo();
        animate();
    }

    function createSoaneDemo() {
        building = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ 
            color: 0xcccccc, 
            transparent: true, 
            opacity: 0.4, 
            side: THREE.DoubleSide 
        });

        // Detailed Soane-Inspired Structure
        const nave = new THREE.Mesh(new THREE.BoxGeometry(16, 6, 6), mat);
        nave.castShadow = nave.receiveShadow = true;
        building.add(nave);

        // Drum with Apertures
        const drum = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 3, 32, 1, true), mat);
        drum.position.set(4, 4.5, 0);
        drum.castShadow = true;
        building.add(drum);

        // Pendentive Dome
        const dome = new THREE.Mesh(new THREE.SphereGeometry(3, 32, 16, 0, Math.PI*2, 0, Math.PI/2), mat);
        dome.position.set(4, 6, 0);
        dome.castShadow = true;
        building.add(dome);

        scene.add(building);
    }

    function animate() {
        requestAnimationFrame(animate);
        
        const hr = document.getElementById('hour').value;
        const op = document.getElementById('opacity').value;
        document.getElementById('hourVal').innerText = Math.floor(hr) + ":" + Math.floor((hr % 1) * 60).toString().padStart(2, '0');
        
        // Solar Vector
        const angle = (hr - 12) * (Math.PI / 6);
        sun.position.set(Math.sin(angle) * 35, 25, Math.cos(angle) * 35);
        
        // Update Transparency
        if(building) {
            building.traverse(n => { if(n.isMesh) n.material.opacity = op; });
        }

        controls.update();
        renderer.render(scene, camera);
    }

    // View Switching Logic
    document.getElementById('spaceJump').addEventListener('change', (e) => {
        const val = e.target.value;
        if(val === 'interior_nave') {
            camera.position.set(-4, -0.5, 0);
            controls.target.set(4, -0.5, 0);
        } else if (val === 'under_dome') {
            camera.position.set(4, -1.8, 0);
            controls.target.set(4, 12, 0);
        } else {
            camera.position.set(15, 10, 15);
            controls.target.set(0, 0, 0);
        }
        controls.update();
    });

    // File Handling
    document.getElementById('imgInput').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            new THREE.TextureLoader().load(event.target.result, (tex) => {
                floor.material.map = tex;
                floor.material.color.set(0xffffff);
                floor.material.needsUpdate = true;
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    init();
</script>
</body>
</html>
